<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Tracker | Full-Stack Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-[#f0f2f5] min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full">
        <div class="text-center mb-10">
            <div class="inline-block p-3 bg-indigo-600 rounded-2xl shadow-lg mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Stock Tracker</h1>
        </div>

        <div class="glass-effect p-6 rounded-3xl shadow-xl shadow-slate-200/50 mb-6">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">Symbol</label>
                    <input type="text" id="symbolInput" placeholder="Enter Ticker (e.g. MSFT)" 
                        class="w-full px-5 py-4 rounded-2xl border-none bg-slate-100 focus:ring-2 focus:ring-indigo-500 transition-all font-semibold text-slate-700">
                </div>
                <button onclick="fetchStock()" 
                    class="w-full bg-slate-900 hover:bg-indigo-600 text-white font-bold py-4 rounded-2xl transition-all duration-300 shadow-lg active:scale-95">
                    Search Market
                </button>
            </div>
        </div>

        <div id="resultCard" class="hidden glass-effect p-8 rounded-3xl shadow-2xl border-b-8 border-indigo-500 transition-all duration-500">
            <div class="flex justify-between items-center">
                <h2 id="stockSymbol" class="text-4xl font-extrabold text-slate-800">AAPL</h2>
                <span id="changeBadge" class="px-4 py-1.5 rounded-xl text-xs font-black uppercase tracking-widest">--</span>
            </div>
            
            <div class="mt-8">
                <div class="flex items-baseline">
                    <span class="text-2xl font-bold text-slate-400 mr-1">$</span>
                    <span id="stockPrice" class="text-6xl font-extrabold text-slate-900 tracking-tighter">0.00</span>
                </div>
                <p class="text-slate-400 font-bold text-xs mt-2">REAL-TIME QUOTE FROM SERVER</p>
            </div>

            <div class="grid grid-cols-2 gap-4 mt-8 pt-6 border-t border-slate-100">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Volume</p>
                    <p id="stockVolume" class="font-bold text-slate-700">--</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Trading Day</p>
                    <p id="tradingDay" class="font-bold text-slate-700">--</p>
                </div>
            </div>
        </div>

        <div id="loader" class="hidden text-center mt-6">
            <div class="inline-block animate-bounce text-indigo-600 font-bold text-sm tracking-widest">
                FETCHING DATA...
            </div>
        </div>
    </div>

    <script>
        async function fetchStock() {
            const symbol = document.getElementById('symbolInput').value.toUpperCase();
            if (!symbol) return;

            const loader = document.getElementById('loader');
            const card = document.getElementById('resultCard');

            // UI Reset
            loader.classList.remove('hidden');
            card.classList.add('hidden');

            try {
                // Flask Backend ko request bhej rahe hain
                const response = await fetch('/get_stock', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symbol: symbol })
                });
                
                const data = await response.json();

                if (data.error) {
                    alert("Error: " + data.error);
                } else {
                    displayResult(data);
                }
            } catch (err) {
                alert("Could not connect to Python Server.");
            } finally {
                loader.classList.add('hidden');
            }
        }

        function displayResult(quote) {
            const price = parseFloat(quote['05. price']).toFixed(2);
            const changePercent = quote['10. change percent'];
            const isPositive = !changePercent.startsWith('-');

            // Update Text
            document.getElementById('stockSymbol').innerText = quote['01. symbol'];
            document.getElementById('stockPrice').innerText = price;
            document.getElementById('stockVolume').innerText = quote['06. volume'];
            document.getElementById('tradingDay').innerText = quote['07. latest trading day'];
            
            // Badge Styling
            const badge = document.getElementById('changeBadge');
            badge.innerText = changePercent;
            badge.className = `px-4 py-1.5 rounded-xl text-xs font-black uppercase tracking-widest ${
                isPositive ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'
            }`;

            // Show Card with animation
            document.getElementById('resultCard').classList.remove('hidden');
        }
    </script>
</body>
</html>
